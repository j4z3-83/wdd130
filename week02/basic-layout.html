<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta description="A basic HTML structure using semantic HTML elements">
    <meta author="Jared Aldridge">
    <title>Basic HTML Structure</title>
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="HTML Logo" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.warhammer.com/en-CA/home">Warhammer</a></li>
            <li><a href="https://gundamextra.com/">Gundam Extra</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Section One Heading</h2>
            <p>Lorem ipsum dolor sit, amet consectetur
                adipisicing elit. Praesentium, sed!</p>
        </section>
        <section>
            <h2>Section Two Heading</h2>
            <p>Lorem ipsum, dolor sit amet
                consectetur adipisicing elit. Excepturi, fuga!</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/london-england/800x500/london-england-temple-lds-650241-wallpaper.jpg"
          alt="London England Temple" width="200">
    </aside>
    <footer>
        <p>Jared Aldridge</p>
    </footer>

</body>

</html>
